<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
overflow:hidden;
}

h1{
font-size:55px;
animation:fadeIn 3s;
}

p{
font-size:22px;
margin-top:10px;
animation:fadeIn 4s;
}

button{
margin-top:30px;
padding:15px 30px;
font-size:20px;
border:none;
border-radius:30px;
background:white;
color:#ff4d6d;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

#message{
margin-top:30px;
font-size:24px;
display:none;
animation:fadeIn 2s;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

/* floating hearts */

.heart{
position:absolute;
color:white;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

</style>
</head>

<body>

<h1>Happy Birthday 🎂</h1>
<p>Today is your special day</p>
<p>And I made something just for you ❤️</p>

<button onclick="showMessage()">Click for Surprise 🎁</button>

<div id="message">
You are an amazing person.<br>
And I'm really happy you exist in this world. 🌸
</div>

<script>

function showMessage(){
document.getElementById("message").style.display="block";
createConfetti();
}

function createConfetti(){
for(let i=0;i<100;i++){
let conf=document.createElement("div");
conf.innerHTML="🎉";
conf.style.position="absolute";
conf.style.left=Math.random()*100+"vw";
conf.style.top=Math.random()*100+"vh";
conf.style.fontSize="30px";
document.body.appendChild(conf);
}
}

/* floating hearts */

setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+15)+"px";
document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

},400);

</script>

</body>
</html>
